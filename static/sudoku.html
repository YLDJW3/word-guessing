<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数独 Sudoku</title>
<style>
:root {
    --bg: #1a1a2e;        --text: #eee;
    --card: #16213e;      --surface: #0f3460;
    --accent: #e94560;    --border: #2a2a4a;
    --purple: #533483;    --hot: #ff6b6b;
    --muted: #aaa;        --faint: #667;
    --given: #cfd8ff;     --user: #74b9ff;
    --peer: #1d2748;      --same: #33415e;    --notes: #8899bb;
    --on-accent: #fff;
}
:root[data-theme="light"] {
    --bg: #f4f5fb;        --text: #1a1f2e;
    --card: #ffffff;      --surface: #e7edf7;
    --accent: #e94560;    --border: #d7deec;
    --purple: #6b4aa8;    --hot: #e0405a;
    --muted: #5a6478;     --faint: #9aa2b4;
    --given: #2f3fa0;     --user: #2f7fd6;
    --peer: #eef2fa;      --same: #d9e2f3;    --notes: #7b8496;
    --on-accent: #fff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px;
    display: flex; flex-direction: column; align-items: center;
    transition: background 0.2s, color 0.2s;
}
#theme-toggle {
    position: fixed; top: 12px; right: 12px; z-index: 1100;
    width: 40px; height: 40px; padding: 0; border-radius: 50%;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); font-size: 1.1rem; cursor: pointer;
    line-height: 1; display: flex; align-items: center; justify-content: center;
}
a { color: var(--user); text-decoration: none; }
h1 { font-size: 1.6rem; margin-bottom: 12px; }
.container { width: 100%; max-width: 480px; }
.topbar { display: flex; justify-content: flex-end; gap: 16px; align-items: center; margin-bottom: 12px; font-size: 0.9rem; color: var(--muted); }
#mistake-box { color: var(--hot); font-weight: 600; }
.site-nav { display: flex; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.site-nav a { flex: 1; text-align: center; padding: 12px 0; color: var(--muted); font-weight: 700; font-size: 1.1rem; text-decoration: none; }
.site-nav a.active { color: var(--text); box-shadow: inset 0 -3px 0 var(--accent); }
.controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
select, button {
    font-size: 0.95rem; padding: 8px 12px; border-radius: 8px; border: none;
    background: var(--surface); color: var(--text); cursor: pointer; font-weight: 600;
}
button.primary { background: var(--accent); color: var(--on-accent); }
button:active { transform: translateY(1px); }
button.toggled { background: var(--accent); color: var(--on-accent); }

/* Grid */
#grid {
    display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr); aspect-ratio: 1;
    width: 100%; background: var(--border); gap: 1px; border: 3px solid var(--purple); border-radius: 6px;
    touch-action: manipulation; user-select: none;
}
.cell {
    background: var(--card); display: flex; align-items: center; justify-content: center;
    font-size: clamp(1.1rem, 6vw, 1.8rem); position: relative; cursor: pointer;
}
/* Bold 3x3 separators */
.cell.br { border-right: 2px solid var(--purple); }
.cell.bb { border-bottom: 2px solid var(--purple); }
.cell.given { color: var(--given); font-weight: 700; }
.cell.user { color: var(--user); }
.cell.sel { background: var(--surface); }
.cell.peer { background: var(--peer); }
.cell.same { background: var(--same); }
.cell.hintflash { animation: flash 1.2s ease; }
.cell.bad { color: var(--hot) !important; }
@keyframes flash { 0%,100%{ background:var(--card) } 30%{ background:var(--accent) } }
.notes { display: grid; grid-template-columns: repeat(3,1fr); width: 100%; height: 100%;
    font-size: clamp(0.5rem, 2.2vw, 0.7rem); color: var(--notes); }
.notes span { display: flex; align-items: center; justify-content: center; }

/* Number pad */
#pad { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; margin: 14px 0; }
#pad button { padding: 12px 0; font-size: 1.2rem; }
#pad button.done { opacity: 0.4; color: var(--faint); }
.actions { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

#hint-panel {
    margin-top: 14px; background: var(--card); border-radius: 10px; padding: 14px;
    min-height: 48px; font-size: 0.95rem; line-height: 1.5; border-left: 3px solid var(--accent);
}
#hint-panel.empty { color: var(--faint); border-left-color: var(--border); }
.win-banner { text-align: center; padding: 18px; margin-top: 14px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--purple)); }
.hidden { display: none !important; }
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: var(--on-accent); padding: 10px 20px; border-radius: 8px; font-weight: 600; z-index: 100; }
</style>
<script>
// Theme: set data-theme before paint to avoid a flash of the wrong theme.
const THEME_KEY = "wg_theme";
(function initTheme() {
    let t;
    try { t = localStorage.getItem(THEME_KEY); } catch (e) {}
    if (!t) t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", t);
})();
function applyThemeIcon() {
    const dark = document.documentElement.getAttribute("data-theme") !== "light";
    const btn = document.getElementById("theme-toggle");
    if (btn) btn.textContent = dark ? "☀️" : "🌙";  // icon shows the theme you'd switch TO
}
function toggleTheme() {
    const cur = document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
    const next = cur === "light" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
    applyThemeIcon();
}
addEventListener("DOMContentLoaded", applyThemeIcon);
</script>
</head>
<body>
<button id="theme-toggle" onclick="toggleTheme()" aria-label="切换主题" title="切换主题"></button>
<div class="container">
    <nav class="site-nav">
        <a href="/">🎯 Semantle</a>
        <a href="/sudoku" class="active">🧩 数独</a>
    </nav>
    <div class="topbar">
        <span id="mistake-box" class="hidden">❌ 错误 <span id="mistakes">0</span></span>
        <span>⏱ <span id="timer">00:00</span></span>
    </div>

    <div class="controls">
        <select id="difficulty">
            <option value="intro">入门</option>
            <option value="middle" selected>中级</option>
            <option value="hard">困难</option>
            <option value="expert">专家</option>
            <option value="master">大师</option>
        </select>
        <button class="primary" onclick="newGame()">新游戏</button>
        <button id="btn-strict" onclick="toggleStrict()" title="严格模式（开局设置，中途不可切换）：只能填入能被逻辑推理确定的数字，猜测会记为错误">🧠 严格</button>
    </div>

    <div id="grid"></div>

    <div id="pad"></div>

    <div class="actions">
        <button id="btn-notes" onclick="toggleNotes()">✏️ 笔记</button>
        <button onclick="clearAllNotes()">🧹 清笔记</button>
        <button onclick="eraseCell()">⌫ 擦除</button>
        <button onclick="checkBoard()">🔍 检查</button>
        <button onclick="getHint()">💡 提示</button>
    </div>

    <div id="hint-panel" class="empty">点击「提示」获取下一步及理由。</div>
    <div id="win-banner" class="win-banner hidden"></div>
</div>

<script src="/static/sudoku-core.js?v=2"></script>
<script>
const SAVE_KEY = "sudoku_save";
let state = null;       // {puzzle, solution, values, notes, given, difficulty, elapsed}
let selected = -1;
let notesMode = false;
let strictMode = false;
let timerId = null;

// ---------- Rendering ----------
function buildGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    for (let i = 0; i < 81; i++) {
        const c = document.createElement("div");
        c.className = "cell";
        const col = i % 9, row = Math.floor(i / 9);
        if (col === 2 || col === 5) c.classList.add("br");
        if (row === 2 || row === 5) c.classList.add("bb");
        c.dataset.i = i;
        c.addEventListener("click", () => selectCell(i));
        grid.appendChild(c);
    }
}

function render() {
    const cells = document.getElementById("grid").children;
    const selVal = selected >= 0 ? state.values[selected] : 0;
    for (let i = 0; i < 81; i++) {
        const el = cells[i];
        el.classList.remove("sel", "peer", "same", "given", "user", "bad");
        const v = state.values[i];
        if (state.given[i]) el.classList.add("given");
        else if (v !== 0) el.classList.add("user");
        // content
        if (v !== 0) {
            el.textContent = v;
        } else if (state.notes[i] && state.notes[i].length) {
            el.innerHTML = '<div class="notes">' +
                [1,2,3,4,5,6,7,8,9].map(n => `<span>${state.notes[i].includes(n) ? n : ""}</span>`).join("") +
                '</div>';
        } else {
            el.textContent = "";
        }
        // highlights
        if (selected >= 0) {
            if (i === selected) el.classList.add("sel");
            else if (SudokuCore.PEERS[selected].includes(i)) el.classList.add("peer");
            if (selVal !== 0 && v === selVal) el.classList.add("same");
        }
    }
    updatePad();
}

// Gray out a digit's pad button once all 9 of it are placed on the board.
function updatePad() {
    const counts = new Array(10).fill(0);
    for (let i = 0; i < 81; i++) counts[state.values[i]]++;
    const pad = document.getElementById("pad").children;
    for (let d = 1; d <= 9; d++) pad[d - 1].classList.toggle("done", counts[d] >= 9);
}

function selectCell(i) { selected = i; render(); }

// ---------- Input ----------
function inputDigit(d) {
    if (selected < 0 || state.given[selected]) return;
    if (notesMode && state.values[selected] === 0) {
        // Pencil marks are never a placement — always allowed, even in strict mode.
        const set = state.notes[selected] || (state.notes[selected] = []);
        const idx = set.indexOf(d);
        if (idx >= 0) set.splice(idx, 1); else set.push(d);
    } else {
        const clearing = state.values[selected] === d;  // tapping the same digit clears it
        // Strict mode: a placed digit must be logically forced right now. Clearing is fine.
        if (state.strict && !clearing) {
            const [r, c] = SudokuCore.rc(selected);
            if (d !== state.solution[selected]) {
                return registerMistake(selected, `R${r + 1}C${c + 1} 填 ${d} 与本局唯一解矛盾 —— 记为一次错误。`);
            }
            // Guard against a stale/old sudoku-core.js lacking forcedCells: fail open
            // (the digit already matches the solution) rather than blocking every placement.
            const forced = (typeof SudokuCore.forcedCells === "function") ? SudokuCore.forcedCells(state.values) : null;
            if (forced && forced[selected] !== d) {
                return registerMistake(selected, `R${r + 1}C${c + 1} 现在还不能确定填 ${d}，这是猜测 —— 记为一次错误。先完成能推理出来的格子。`);
            }
        }
        state.values[selected] = clearing ? 0 : d;
        state.notes[selected] = [];
    }
    save(); render(); checkWin();
}
// Strict-mode violation: reject the digit, count + report it, flash the cell red.
function registerMistake(cell, msg) {
    state.mistakes = (state.mistakes || 0) + 1;
    save();
    updateMistakeDisplay();
    const el = document.getElementById("grid").children[cell];
    el.classList.add("bad");
    setTimeout(() => el.classList.remove("bad"), 1200);
    showHint("❌ " + msg, false);
}
function eraseCell() {
    if (selected < 0 || state.given[selected]) return;
    state.values[selected] = 0; state.notes[selected] = [];
    save(); render();
}
function clearAllNotes() {
    for (let i = 0; i < 81; i++) state.notes[i] = [];
    save(); render();
}
function toggleNotes() {
    notesMode = !notesMode;
    document.getElementById("btn-notes").classList.toggle("toggled", notesMode);
}
function toggleStrict() {
    // Strict is a START parameter: it only applies to the next 新游戏, never the
    // game in progress. Toggling here just records the choice for the next game.
    strictMode = !strictMode;
    document.getElementById("btn-strict").classList.toggle("toggled", strictMode);
    showHint(strictMode
        ? "🧠 已选择严格模式，将在「新游戏」后生效（不影响当前这一局）。"
        : "已取消严格模式，将在「新游戏」后生效（不影响当前这一局）。", false);
}
function updateMistakeDisplay() {
    // The counter reflects the CURRENT game's mode; the button reflects the
    // pending choice for the next game (like the difficulty selector).
    const on = !!(state && state.strict);
    document.getElementById("mistake-box").classList.toggle("hidden", !on);
    document.getElementById("mistakes").textContent = state ? (state.mistakes || 0) : 0;
    document.getElementById("btn-strict").classList.toggle("toggled", strictMode);
}

function buildPad() {
    const pad = document.getElementById("pad");
    pad.innerHTML = "";
    for (let d = 1; d <= 9; d++) {
        const b = document.createElement("button");
        b.textContent = d;
        b.addEventListener("click", () => inputDigit(d));
        pad.appendChild(b);
    }
}

// ---------- Check / Hint / Win ----------
function checkBoard() {
    const cells = document.getElementById("grid").children;
    let wrong = 0;
    for (let i = 0; i < 81; i++) {
        if (state.values[i] !== 0 && !state.given[i] && state.values[i] !== state.solution[i]) {
            cells[i].classList.add("bad"); wrong++;
        }
    }
    showHint(wrong === 0 ? "✅ 目前填入的数字都正确。" : `❌ 有 ${wrong} 个数字填错了（已用红色标出）。`, wrong === 0);
    if (wrong) setTimeout(render, 1500);
}

function getHint() {
    const h = SudokuCore.getHint(state.values.slice(), state.solution);
    if (h.type === "place") {
        state.values[h.cell] = h.digit;
        state.notes[h.cell] = [];
        selected = h.cell;
        save(); render();
        const cell = document.getElementById("grid").children[h.cell];
        cell.classList.add("hintflash");
        setTimeout(() => cell.classList.remove("hintflash"), 1200);
        showHint("💡 " + h.reason);
        checkWin();
    } else {
        showHint((h.type === "error" ? "⚠️ " : "") + (h.reason || h.message));
    }
}

function showHint(text, ok) {
    const p = document.getElementById("hint-panel");
    p.textContent = text;
    p.classList.remove("empty");
}

function checkWin() {
    if (state.values.some((v, i) => v !== state.solution[i])) return false;
    stopTimer();
    const b = document.getElementById("win-banner");
    b.classList.remove("hidden");
    const strictNote = state.strict ? ` · 🧠 严格 · 错误 ${state.mistakes || 0} 次` : "";
    b.innerHTML = `<h2>🎉 完成！</h2><p>难度：${labelFor(state.difficulty)} · 用时 ${fmt(state.elapsed)}${strictNote}</p>`;
    clearSave();
    return true;
}

// ---------- Timer ----------
function fmt(s) { const m = Math.floor(s / 60), sec = s % 60; return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`; }
function startTimer() {
    stopTimer();
    timerId = setInterval(() => { state.elapsed++; document.getElementById("timer").textContent = fmt(state.elapsed); save(); }, 1000);
}
function stopTimer() { if (timerId) { clearInterval(timerId); timerId = null; } }

// ---------- Persistence ----------
function save() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
}
function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }
function load() {
    try {
        const s = JSON.parse(localStorage.getItem(SAVE_KEY) || "null");
        if (s && s.values && s.solution && s.values.length === 81) return s;
    } catch (e) {}
    return null;
}

const LABELS = { intro: "入门", middle: "中级", hard: "困难", expert: "专家", master: "大师" };
function labelFor(d) { return LABELS[d] || d; }

// ---------- Game lifecycle ----------
function newGame() {
    const difficulty = document.getElementById("difficulty").value;
    const r = SudokuCore.generatePuzzle(difficulty);
    state = {
        puzzle: r.puzzle, solution: r.solution, difficulty,
        values: r.puzzle.slice(),
        given: r.puzzle.map(v => v !== 0),
        notes: Array.from({ length: 81 }, () => []),
        elapsed: 0,
        strict: strictMode,
        mistakes: 0,
    };
    selected = -1;
    document.getElementById("win-banner").classList.add("hidden");
    document.getElementById("timer").textContent = "00:00";
    showHint("点击「提示」获取下一步及理由。", false);
    document.getElementById("hint-panel").classList.add("empty");
    updateMistakeDisplay();
    render();
    startTimer();
}

function resume(s) {
    state = s;
    if (!state.notes) state.notes = Array.from({ length: 81 }, () => []);
    state.mistakes = state.mistakes || 0;
    state.strict = !!state.strict;
    strictMode = state.strict;
    document.getElementById("difficulty").value = state.difficulty;
    selected = -1;
    document.getElementById("timer").textContent = fmt(state.elapsed);
    updateMistakeDisplay();
    render();
    if (!checkWin()) startTimer();
}

// ---------- Keyboard ----------
document.addEventListener("keydown", (e) => {
    if (e.key >= "1" && e.key <= "9") inputDigit(+e.key);
    else if (e.key === "Backspace" || e.key === "Delete" || e.key === "0") eraseCell();
    else if (e.key === "n") toggleNotes();
    else if (e.key === "s") toggleStrict();
    else if (e.key === "h") getHint();
    else if (selected >= 0 && ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
        let [r, c] = [Math.floor(selected / 9), selected % 9];
        if (e.key === "ArrowUp") r = (r + 8) % 9;
        if (e.key === "ArrowDown") r = (r + 1) % 9;
        if (e.key === "ArrowLeft") c = (c + 8) % 9;
        if (e.key === "ArrowRight") c = (c + 1) % 9;
        selectCell(r * 9 + c); e.preventDefault();
    }
});

// ---------- Init ----------
buildGrid();
buildPad();
const saved = load();
if (saved) resume(saved); else newGame();
</script>
</body>
</html>
